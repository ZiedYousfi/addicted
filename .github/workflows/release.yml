name: Release

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      release_tag:
        description: Existing release tag to attach assets to
        required: false
        type: string

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            archive: tar.gz
          - goos: linux
            goarch: arm64
            archive: tar.gz
          - goos: darwin
            goarch: amd64
            archive: tar.gz
          - goos: darwin
            goarch: arm64
            archive: tar.gz
          - goos: windows
            goarch: amd64
            archive: zip

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Determine asset tag
        shell: bash
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "release" ]; then
            release_tag="${{ github.event.release.tag_name }}"
          elif [ -n "${{ inputs.release_tag }}" ]; then
            release_tag="${{ inputs.release_tag }}"
          else
            release_tag="manual-${{ github.run_number }}"
          fi

          echo "RELEASE_TAG=$release_tag" >> "$GITHUB_ENV"

      - name: Build release binary
        shell: bash
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          set -euo pipefail

          mkdir -p dist

          binary_name="addicted"
          if [ "$GOOS" = "windows" ]; then
            binary_name="${binary_name}.exe"
          fi

          output_dir="dist/addicted_${RELEASE_TAG}_${GOOS}_${GOARCH}"
          mkdir -p "$output_dir"

          go build -trimpath -ldflags "-s -w" -o "$output_dir/$binary_name" .

          asset_path="$output_dir"
          if [ "${{ matrix.archive }}" = "zip" ]; then
            archive_path="${output_dir}.zip"
            (
              cd dist
              zip -r "$(basename "$archive_path")" "$(basename "$output_dir")"
            )
            asset_path="$archive_path"
          else
            archive_path="${output_dir}.tar.gz"
            tar -C dist -czf "$archive_path" "$(basename "$output_dir")"
            asset_path="$archive_path"
          fi

          echo "ASSET_PATH=$asset_path" >> "$GITHUB_ENV"
          echo "ASSET_NAME=$(basename "$asset_path")" >> "$GITHUB_ENV"

      - name: Upload workflow artifact
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ASSET_NAME }}
          path: ${{ env.ASSET_PATH }}

      - name: Upload release asset
        if: github.event_name == 'release' || inputs.release_tag != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          files: ${{ env.ASSET_PATH }}
